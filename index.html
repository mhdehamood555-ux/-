<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery سريع</title>

<!-- خط احترافي -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:#111;
  color:white;
  text-align:center;
}

/* خلفية ناعمة */
.container{
  padding:20px;
}

/* اللوقو */
.logo{
  width:130px;
  margin-top:20px;
}

/* العنوان */
h1{
  font-size:26px;
  margin-top:15px;
}

/* وصف */
p{
  opacity:0.8;
}

/* الحقول */
input, select, textarea{
  width:90%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:1px solid #333;
  font-size:16px;
  background:#1e1e1e;
  color:white;
  text-align:center;
  transition:0.2s;
}

input:focus, textarea:focus, select:focus{
  outline:none;
  border-color:#f1c40f;
  box-shadow:0 0 5px #f1c40f;
}

/* textarea */
textarea{
  height:100px;
}

/* الأزرار */
button{
  background:#f1c40f;
  border:none;
  padding:15px;
  border-radius:12px;
  font-size:18px;
  margin-top:15px;
  width:90%;
  font-weight:bold;
  color:black;
  transition:0.2s;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

button:hover{
  transform:scale(1.03);
}

button:active{
  transform:scale(0.97);
}

/* إخفاء */
.hidden{
  display:none;
}

.note{
  font-size:13px;
  margin-top:10px;
  opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

  <!-- الصفحة الأولى -->
  <div id="home">
    <img class="logo" src="https://i.postimg.cc/C5gDy2Jr/sssdsd1.png">

    <h1>مرحباً بك في ديليفري سريع 🛵</h1>
    <p>اطلب أي شيء ونحن نوصله لك بأسرع وقت 🔥</p>

    <button onclick="start()">ابدأ الطلب</button>
  </div>

  <!-- صفحة الطلب -->
  <div id="order" class="hidden">

    <input id="name" placeholder="الاسم">
    <input id="phone" placeholder="رقم الهاتف">

    <!-- اسم المحل -->
    <input id="store" placeholder="اسم المحل (مثلاً: مطعم، سوبرماركت...)">

    <!-- البلدة -->
    <select id="town">
      <option value="">اختر البلدة</option>
      <option>مجد الكروم</option>
      <option>دير الأسد</option>
      <option>البعنة</option>
      <option>كرمئيل</option>
      <option>نحف</option>
      <option>بار ليف</option>
    </select>

    <textarea id="orderText" placeholder="ماذا تريد؟ ✍️"></textarea>

    <button onclick="sendOrder()">إرسال الطلب 🚀</button>

    <p class="note">
📍 بعد إرسال الطلب، أرسل موقعك من واتساب لتسريع التوصيل
    </p>

  </div>

</div>

<script>

function start(){
  document.getElementById("home").style.display="none";
  document.getElementById("order").style.display="block";
}

function sendOrder(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let store = document.getElementById("store").value;
  let town = document.getElementById("town").value;
  let order = document.getElementById("orderText").value;

  if(name=="" || phone=="" || store=="" || town=="" || order==""){
    alert("املأ كل الحقول ❌");
    return;
  }

  let msg = `طلب جديد 🚀

الاسم: ${name}
الهاتف: ${phone}
المحل: ${store}
البلدة: ${town}

الطلب:
${order}

📍 يرجى إرسال موقعك بعد هذه الرسالة`;

  let whatsapp = "972546088878"; // غير الرقم

  window.open(`https://wa.me/${whatsapp}?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
