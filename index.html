<!DOCTYPE html>
<html lang="ar">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery سريع</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#111;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

header{
  background:#1a1a1a;
  padding:8px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  box-shadow:0 0 10px #000;
}
.title{
  font-size:18px;
  font-weight:bold;
  color:#d4a000;
}
.profile{
  position:absolute;
  right:10px;
  width:34px;
  height:34px;
  border-radius:50%;
  background:#d4a000;
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
.logo{
  width:80px;
  margin-top:10px;
}
.welcome{
  font-size:14px;
  opacity:.9;
  padding:10px 20px;
}
.section{
  display:none;
  animation:fade .4s;
  padding:20px;
}
@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}
button{
  background:#d4a000;
  border:none;
  padding:14px;
  border-radius:12px;
  font-size:18px;
  margin-top:10px;
  color:black;
  font-weight:bold;
  width:90%;
  transition:.2s;
}
button:active{
  transform:scale(.95);
}
input,textarea,select{
  width:90%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #333;
  font-size:16px;
  background:#1e1e1e;
  color:white;
  text-align:center;
}
.storeGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:10px;
}
.store{
  background:#1e1e1e;
  border-radius:14px;
  padding:10px;
  box-shadow:0 0 10px #000;

}
.store img{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:contain;
  background:#222;
}

.back{
  background:#444;
  color:white;
}

.gallery img{
  width:100%;
  height:auto;
  border-radius:14px;
  object-fit:cover;
  margin-top:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.accountBox{
  position:fixed;
  top:60px;
  right:10px;
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  display:none;
  width:200px;
  box-shadow:0 0 10px black;
}
.accountBox input{
  width:100%;
  margin-bottom:8px;
}
.storeText p{
  margin:5px 0;
}
.orderButtons{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.orderButtons button{
  flex:1;
}

.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.product{
background:#1e1e1e;
padding:10px;
border-radius:12px;
}

.product img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
}

.product button{
padding:6px;
font-size:14px;
margin-top:5px;
}

</style>
</head>

<header>

  <div class="profile" onclick="toggleAccount()">👤</div>

<div id="cartButton" onclick="openOrder()" style="

 background:yellow;

   <button class="back" onclick="backFromOrder()">رجوع</button>

  </div>

  <div class="storeText" id="storeText"></div>
  <div class="gallery" id="gallery"></div>
  اذا واجهتم أي مشكلة<br>يمكنكم الاتصال بنا على:0546088878
</div>

<div id="orderPage" class="section">

  <!-- زر الرجوع -->
  <button class="back" onclick="backFromOrder()">رجوع</button>

  <h2>طلبك</h2>

  <!-- صورة واسم المتجر -->
  <img id="orderStoreLogo" style="width:70px; height:70px; border-radius:50%; object-fit:cover; margin:10px 0;">
  <h3 id="orderStoreName"></h3>

  <!-- بيانات الزبون -->
  <input id="orderName" placeholder="اسمك">
  <input id="orderPhone" placeholder="رقم الهاتف">

  <div id="cartView"></div>
<h3>المجموع: <span id="total">0</span> ₪</h3>

  <!-- زر نسخ وإرسال الطلب -->
  <button onclick="sendOrder()">نسخ وارسال عبر واتساب</button>

</div>

<div id="categories" class="section" style="display:none">
  <h2>اختر تصنيف المتجر</h2>
  <div class="categoryGrid" style="display:grid; grid-template-columns:repeat(2,1fr); gap:15px; margin-top:20px;">
    <div class="category" onclick="showStoresByCategory('fastfood')">
      <img src="رابط صورة طعام سريع" style="width:70px;height:70px;border-radius:50%;object-fit:cover;">
      <div>طعام سريع</div>
    </div>
    <div class="category" onclick="showStoresByCategory('meat')">
      <img src="رابط صورة سوبرماركت" style="width:70px;height:70px;border-radius:50%;object-fit:cover;">
      <div>ملحمة</div>
    </div>
    <div class="category" onclick="showStoresByCategory('bakery')">
      <img src="رابط صورة مخبز" style="width:70px;height:70px;border-radius:50%;object-fit:cover;">
      <div>مخبز</div>
    </div>
    <div class="category" onclick="showStoresByCategory('coffee')">
      <img src="رابط صورة قهوة" style="width:70px;height:70px;border-radius:50%;object-fit:cover;">
      <div>قهوة</div>
    </div>
    <div class="category" onclick="showStoresByCategory('sweets')">
      <img src="رابط صورة حلويات" style="width:70px;height:70px;border-radius:50%;object-fit:cover;">
      <div>حلويات</div>
    </div>
    <div class="category" onclick="showStoresByCategory('all')">
      <img src="رابط صورة الكل" style="width:70px;height:70px;border-radius:50%;object-fit:cover;">
      <div>الكل</div>
    </div>
  </div>
</div>


<script>

function backFromOrder(){
  hideAll();
  document.getElementById("categories").style.display = "block"; // العودة إلى التصنيفات
}

function backToCategories(){
  hideAll(); // اخفاء كل الأقسام
  document.getElementById("categories").style.display = "block"; // اظهار شاشة التصنيفات
}

function showStoresByCategory(cat){
  hideAll();
  document.getElementById("stores").style.display = "block";

  let list = document.getElementById("storesList");
  list.innerHTML = `<button class="back" onclick="backToCategories()">رجوع</button>`; // زر الرجوع

  let filtered = cat === "all" ? stores : stores.filter(s => s.category === cat);

  filtered.forEach((s, i) => {
    list.innerHTML += `
      <div class="store">
        <img src="${s.logo}">
        <h4>${s.name}</h4>
        <div style="opacity:0.7;font-size:14px;">${s.category}</div> <!-- عرض النوع -->
        <button onclick="openStore(${stores.indexOf(s)})">طلب</button>
      </div>
    `;
  });
}

let cart=[]

function addToCart(i){
let p=currentStore.products[i]

let found=cart.find(x=>x.name==p.name)

if(found){
  found.qty++
}else{
  cart.push({...p, qty:1})
}

renderCart() // 🔥 هذا أهم سطر

alert("تمت الإضافة ✔️")
}

function renderCart(){

let html=""
let total=0

cart.forEach(item=>{
  html+=`${item.name} x${item.qty}<br>`
  total+=item.price*item.qty
})

document.getElementById("cartView").innerHTML=html
document.getElementById("total").innerText=total

}

function hideAll(){document.querySelectorAll(".section").forEach(e=>e.style.display="none")}

function enter(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let town = document.getElementById("town").value;

  localStorage.setItem("name", name);
  localStorage.setItem("phone", phone);
  localStorage.setItem("town", town);

  document.getElementById("cartButton").style.display = "block"; // إظهار السلة بعد الدخول

  hideAll();
  document.getElementById("categories").style.display = "block";
}

function showStores(){
  hideAll()
  document.getElementById("stores").style.display="block"
  let list=document.getElementById("storesList")
  list.innerHTML=""
  stores.forEach((s,i)=>{
    list.innerHTML+=`<div class="store"><img src="${s.logo}"><h4>${s.name}</h4><button onclick="openStore(${i})">طلب</button></div>`
  })
}
function openStore(i){

  currentStore=stores[i]
 cart = []
  hideAll()
  document.getElementById("storePage").style.display="block"
  document.getElementById("storeName").innerText = currentStore.name
  let textHTML = `<p style="font-weight:bold;">${currentStore.mainText}</p><p style="font-size:14px; opacity:0.8;">${currentStore.subText}</p>`

 
document.getElementById("storeText").innerHTML = textHTML
let gallery = document.getElementById("gallery")
let html = `
<div style="
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
">
`
currentStore.images.forEach(img=>{
  html += `
  <img src="${img}" 
  style="
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:14px;
  "
  loading="lazy"
  >
  `
})

html += '</div>'

gallery.innerHTML = html

let productsHTML = `<div class="products">`

currentStore.products?.forEach((p,i)=>{
  productsHTML += `
  <div class="product">
    <img src="${p.img}">
    <div>${p.name}</div>
    <div>${p.price} ₪</div>
    <button onclick="addToCart(${i})">+</button>
  </div>
  `
})

productsHTML += `</div>`

gallery.innerHTML += productsHTML

}


function openOrder(){
  hideAll()

renderCart()

  document.getElementById("orderPage").style.display="block"

  // بيانات المستخدم
  document.getElementById("orderName").value = localStorage.getItem("name")
  document.getElementById("orderPhone").value = localStorage.getItem("phone")

  // بيانات المتجر الذي اختاره الزبون
  document.getElementById("orderStoreLogo").src = currentStore.logo
  document.getElementById("orderStoreName").innerText = currentStore.name
}

function backStore(){hideAll();document.getElementById("storePage").style.display="block"}

function sendOrder(){

if(cart.length==0){
  alert("السلة فارغة ❌")
  return
}

let name=document.getElementById("orderName").value
let phone=document.getElementById("orderPhone").value
let town=localStorage.getItem("town")

let order=cart.map(i=>`${i.name} x${i.qty}`).join("\n")

let msg=`طلب جديد\n\nالاسم: ${name}\nالهاتف: ${phone}\nالبلدة: ${town}\n\nالمتجر: ${currentStore.name}\n\nالطلب:\n${order}`

navigator.clipboard.writeText(msg)

window.open(`https://wa.me/972546088878?text=${encodeURIComponent(msg)}`)

cart = []
renderCart()

}

function toggleAccount(){
  let box=document.getElementById("accountBox")
  if(box.style.display=="block"){box.style.display="none"}
  else{
    box.style.display="block"
    document.getElementById("accName").value=localStorage.getItem("name")
    document.getElementById("accPhone").value=localStorage.getItem("phone")
    document.getElementById("accTown").value=localStorage.getItem("town")
  }
}
function saveAccount(){
  localStorage.setItem("name",document.getElementById("accName").value)
  localStorage.setItem("phone",document.getElementById("accPhone").value)
  localStorage.setItem("town",document.getElementById("accTown").value)
  document.getElementById("total").style.color="yellow"
setTimeout(()=>{
document.getElementById("total").style.color="white"
},500)

}

function renderCart(){
  let html=""
  let total=0
  let count=0

  cart.forEach((item,i)=>{
    html += `
      <div style="margin-bottom:8px;">
        ${item.name} x${item.qty} 
        <button onclick="editCartItem(${i})" style="padding:2px 5px; font-size:12px;">✏️ تعديل</button>
      </div>
    `
    total += item.price * item.qty
    count += item.qty
  })

  document.getElementById("cartView").innerHTML = html
  document.getElementById("total").innerText = total
  document.getElementById("cartCount").innerText = count
}

function addToCart(i){
  let p=currentStore.products[i]
  let found=cart.find(x=>x.name==p.name)
  if(found){
    found.qty++
  }else{
    cart.push({...p, qty:1})
  }
  renderCart()
  alert("تمت الإضافة ✔️")
}

// اخفاء السلة افتراضياً
document.getElementById("cartButton").style.display = "none";

function editCartItem(i){
  let newName = prompt("قم بتعديل المنتج أو إضافة ملاحظة:", cart[i].name)
  if(newName !== null && newName.trim() !== ""){
    cart[i].name = newName.trim()
    renderCart()
    alert("تم تعديل المنتج ✔️")
  }
}
