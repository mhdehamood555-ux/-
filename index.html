<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery سريع</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#111;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

header{
  background:#1a1a1a;
  padding:8px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  box-shadow:0 0 10px #000;
}
.title{
  font-size:18px;
  font-weight:bold;
  color:#d4a000;
}
.profile{
  position:absolute;
  right:10px;
  width:34px;
  height:34px;
  border-radius:50%;
  background:#d4a000;
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
.logo{
  width:80px;
  margin-top:10px;
}
.welcome{
  font-size:14px;
  opacity:.9;
  padding:10px 20px;
}
.section{
  display:none;
  animation:fade .4s;
  padding:20px;
}
@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}
button{
  background:#d4a000;
  border:none;
  padding:14px;
  border-radius:12px;
  font-size:18px;
  margin-top:10px;
  color:black;
  font-weight:bold;
  width:90%;
  transition:.2s;
}
button:active{
  transform:scale(.95);
}
input,textarea,select{
  width:90%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #333;
  font-size:16px;
  background:#1e1e1e;
  color:white;
  text-align:center;
}
.storeGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:10px;
}
.store{
  background:#1e1e1e;
  border-radius:14px;
  padding:10px;
  box-shadow:0 0 10px #000;

}
.store img{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:contain;
  background:#222;
}

.back{
  background:#444;
  color:white;
}

.gallery img{
  width:100%;
  height:auto;
  border-radius:14px;
  object-fit:cover;
  margin-top:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.accountBox{
  position:fixed;
  top:60px;
  right:10px;
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  display:none;
  width:200px;
  box-shadow:0 0 10px black;
}
.accountBox input{
  width:100%;
  margin-bottom:8px;
}
.storeText p{
  margin:5px 0;
}
.orderButtons{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.orderButtons button{
  flex:1;
}
</style>
</head>
<body>

<header>
  <div class="title">Delivery sari3</div>
  <div class="profile" onclick="toggleAccount()">👤</div>
</header>

<img class="logo" src="https://i.postimg.cc/C5gDy2Jr/sssdsd1.png">
<div class="welcome">
  مرحباً بك <br>
  من خلال موقعنا يمكنك انشاء طلبات والحصول عليها بأسرع وقت ممكن.
</div>

<div class="accountBox" id="accountBox">
  <input id="accName" placeholder="الاسم">
  <input id="accPhone" placeholder="رقم الهاتف">
  <input id="accTown" placeholder="البلدة">
  <button onclick="saveAccount()">حفظ</button>
</div>

<div id="login" class="section" style="display:block">
  <h3>تسجيل الدخول</h3>
  <input id="name" placeholder="اسمك">
  <input id="phone" placeholder="رقم الهاتف">
  <select id="town">
    <option>مجد الكروم</option>
    <option>دير الأسد</option>
    <option>بعنة</option>
    <option>نحف</option>
    <option>كرمئيل</option>
  </select>
  <button onclick="enter()">دخول</button>
</div>

<div id="stores" class="section">
  <h2>المتاجر</h2>
  <div id="storesList" class="storeGrid"></div>
</div>

<div id="storePage" class="section">
  <div class="orderButtons">
    <button class="back" onclick="showStores()">رجوع</button>
    <button onclick="openOrder()">اطلب</button>
  </div>
  <h2 id="storeName"></h2>
  <div class="storeText" id="storeText"></div>
  <div class="gallery" id="gallery"></div>
  اذا واجهتم أي مشكلة<br>يمكنكم الاتصال بنا على:0546088878
</div>

<div id="orderPage" class="section">

  <!-- زر الرجوع -->
  <button class="back" onclick="backStore()">رجوع</button>

  <h2>طلبك</h2>

  <!-- صورة واسم المتجر -->
  <img id="orderStoreLogo" style="width:70px; height:70px; border-radius:50%; object-fit:cover; margin:10px 0;">
  <h3 id="orderStoreName"></h3>

  <!-- بيانات الزبون -->
  <input id="orderName" placeholder="اسمك">
  <input id="orderPhone" placeholder="رقم الهاتف">
  <textarea id="orderText" placeholder="طلبي هو"></textarea>

  <!-- زر نسخ وإرسال الطلب -->
  <button onclick="sendOrder()">نسخ وارسال عبر واتساب</button>

</div>

function hideAll(){document.querySelectorAll(".section").forEach(e=>e.style.display="none")}
function enter(){
  let name=document.getElementById("name").value
  let phone=document.getElementById("phone").value
  let town=document.getElementById("town").value
  localStorage.setItem("name",name)
  localStorage.setItem("phone",phone)
  localStorage.setItem("town",town)
  showStores()
}
function showStores(){
  hideAll()
  document.getElementById("stores").style.display="block"
  let list=document.getElementById("storesList")
  list.innerHTML=""
  stores.forEach((s,i)=>{
    list.innerHTML+=<div class="store"><img src="${s.logo}"><h4>${s.name}</h4><button onclick="openStore(${i})">طلب</button></div>
  })
}
function openStore(i){
  currentStore=stores[i]
  hideAll()
  document.getElementById("storePage").style.display="block"
  document.getElementById("storeName").innerText = currentStore.name
  let textHTML = <p style="font-weight:bold;">${currentStore.mainText}</p><p style="font-size:14px; opacity:0.8;">${currentStore.subText}</p>

 
document.getElementById("storeText").innerHTML = textHTML
let gallery = document.getElementById("gallery")
let html = `
<div style="
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
">
`
currentStore.images.forEach(img=>{
  html += `
  <img src="${img}" 
  style="
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:14px;
  "
  loading="lazy"
  >
  `
})

html += '</div>'

gallery.innerHTML = html
}


function openOrder(){
  hideAll()
  document.getElementById("orderPage").style.display="block"

  // بيانات المستخدم
  document.getElementById("orderName").value = localStorage.getItem("name")
  document.getElementById("orderPhone").value = localStorage.getItem("phone")

  // بيانات المتجر الذي اختاره الزبون
  document.getElementById("orderStoreLogo").src = currentStore.logo
  document.getElementById("orderStoreName").innerText = currentStore.name
}

function backStore(){hideAll();document.getElementById("storePage").style.display="block"}
function sendOrder(){
  let name=document.getElementById("orderName").value
  let phone=document.getElementById("orderPhone").value
  let town=localStorage.getItem("town")
  let order=document.getElementById("orderText").value
  let msg=طلب جديد\n\nالاسم: ${name}\nالهاتف: ${phone}\nالبلدة: ${town}\n\nالمتجر: ${currentStore.name}\n\nالطلب:\n${order}
  navigator.clipboard.writeText(msg)
  window.open(https://wa.me/972546088878?text=${encodeURIComponent(msg)})
}
function toggleAccount(){
  let box=document.getElementById("accountBox")
  if(box.style.display=="block"){box.style.display="none"}
  else{
    box.style.display="block"
    document.getElementById("accName").value=localStorage.getItem("name")
    document.getElementById("accPhone").value=localStorage.getItem("phone")
    document.getElementById("accTown").value=localStorage.getItem("town")
  }
}
function saveAccount(){
  localStorage.setItem("name",document.getElementById("accName").value)
  localStorage.setItem("phone",document.getElementById("accPhone").value)
  localStorage.setItem("town",document.getElementById("accTown").value)
  alert("تم حفظ التعديل")
}
