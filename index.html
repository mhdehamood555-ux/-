<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery سريع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== إعدادات عامة ===== */
html, body {
  height: 100%;
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #111;
  color: white;
  overflow-y: auto;
}

/* ===== الحاوية الرئيسية ===== */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

/* ===== كل الصفحات ===== */
#home, #user, #types, #details {
  width: 100%;
  max-width: 380px;
  margin: 20px 0;
  padding: 20px;
  background: #181818;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== اللوجو ===== */
.logo {
  width: 100px;
  margin: 0 auto 10px;
  display: block;
}

/* ===== العناوين ===== */
h2 {
  text-align: center;
  margin: 10px 0;
}

/* ===== النصوص ===== */
p {
  text-align: center;
  opacity: 0.75;
  font-size: 14px;
}

/* ===== الحقول ===== */
input, textarea, select {
  width: 100%;
  padding: 13px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #111;
  color: white;
  font-size: 14px;
  text-align: center;
  transition: 0.2s;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #f1c40f;
  box-shadow: 0 0 5px #f1c40f;
}

textarea {
  min-height: 90px;
  resize: none;
}

/* ===== الأزرار ===== */
button {
  width: 100%;
  padding: 13px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  background: #f1c40f;
  font-weight: bold;
  font-size: 15px;
  color: black;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

button:active {
  transform: scale(0.97);
}

/* ===== زر الرجوع ===== */
.back {
  background: #2a2a2a;
  color: #f1c40f;
}

/* ===== كروت اختيار النوع ===== */
.card {
  width: 100%;
  background: #111;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid #333;
  transition: 0.2s;
  text-align: center;
  font-size: 16px;
}

.card:hover {
  border-color: #f1c40f;
  background: #1c1c1c;
  transform: scale(1.02);
}

/* ===== إخفاء ===== */
.hidden {
  display: none;
}

/* ===== تحسين الموبايل ===== */
@media (max-width: 480px) {
  .container {
    padding: 10px;
  }

  h2 {
    font-size: 20px;
  }

  button {
    font-size: 14px;
  }

  .card {
    font-size: 14px;
  }
}
  
</style>
</head>

<body>
<div class="container">

<!-- الصفحة الرئيسية -->
<div id="home">
  <img class="logo" src="https://i.postimg.cc/C5gDy2Jr/sssdsd1.png">
  <h2>ديليفري سريع 🛵</h2>
  <p>اطلب أي شيء بسرعة وراحة</p>
  <button onclick="goToUser()">ابدأ الطلب</button>
</div>

<!-- بيانات المستخدم -->
<div id="user" class="hidden">
  <img class="logo" src="https://i.postimg.cc/C5gDy2Jr/sssdsd1.png">
  <input id="name" placeholder="الاسم">
  <input id="phone" placeholder="رقم الهاتف">
  
  <select id="town">
    <option value="">اختر البلدة</option>
    <option>مجد الكروم</option>
    <option>دير الأسد</option>
    <option>البعنة</option>
    <option>كرمئيل</option>
  </select>

  <button onclick="saveUser()">التالي</button>
  <button class="back" onclick="backHome()">رجوع</button>
</div>

<!-- اختيار النوع -->
<div id="types" class="hidden">
  <img class="logo" src="https://i.postimg.cc/C5gDy2Jr/sssdsd1.png">

  <div class="card" onclick="selectType('طعام')">🍔 طلب طعام</div>
  <div class="card" onclick="selectType('سوبرماركت')">🛒 سوبرماركت</div>
  <div class="card" onclick="selectType('أغراض')">📦 توصيل أغراض</div>
  <div class="card" onclick="selectType('هدية')">🎁 توصيل هدية</div>

  <button class="back" onclick="backUser()">رجوع</button>
</div>

<!-- التفاصيل -->
<div id="details" class="hidden">
  <img class="logo" src="https://i.postimg.cc/C5gDy2Jr/sssdsd1.png">

  <div id="dynamicFields"></div>

  <button onclick="sendOrder()">إرسال الطلب 🚀</button>
  <button class="back" onclick="backTypes()">رجوع</button>
</div>

</div>

<script>
let userData = {};
let orderType = "";

function goToUser(){
  hideAll();
  document.getElementById("user").style.display="block";
}

function saveUser(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let town = document.getElementById("town").value;

  if(!name || !phone || !town){
    alert("املأ جميع البيانات");
    return;
  }

  userData = {name, phone, town};

  hideAll();
  document.getElementById("types").style.display="block";
}

function selectType(type){
  orderType = type;
  let html = "";

  if(type=="طعام"){
    html = `
    <input id="store" placeholder="اسم المطعم">
    <textarea id="detailsText" placeholder="ماذا تريد؟"></textarea>`;
  }

  if(type=="سوبرماركت"){
    html = `
    <input id="store" placeholder="اسم السوبرماركت">
    <textarea id="detailsText" placeholder="اكتب قائمة المشتريات"></textarea>`;
  }

  if(type=="أغراض"){
    html = `
    <textarea id="detailsText" placeholder="ما الذي تريد توصيله؟ ومن أين إلى أين؟"></textarea>`;
  }

  if(type=="هدية"){
    html = `
    <textarea id="detailsText" placeholder="ما هي الهدية؟ هل هناك رسالة؟"></textarea>`;
  }

  document.getElementById("dynamicFields").innerHTML = html;

  hideAll();
  document.getElementById("details").style.display="block";
}

function sendOrder(){
  let details = document.getElementById("detailsText").value;
  let store = document.getElementById("store") ? document.getElementById("store").value : "";

  if(!details){
    alert("اكتب التفاصيل");
    return;
  }

  let msg = `🚀 طلب جديد - Delivery سريع

👤 الاسم: ${userData.name}
📞 الهاتف: ${userData.phone}
📍 البلدة: ${userData.town}

📦 نوع الطلب: ${orderType}

🏪 المحل: ${store}

📝 التفاصيل:
${details}

📍 الرجاء إرسال الموقع لتسريع التوصيل`;

  let phone = "972546088878";

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

function hideAll(){
  document.getElementById("home").style.display="none";
  document.getElementById("user").style.display="none";
  document.getElementById("types").style.display="none";
  document.getElementById("details").style.display="none";
}

function backHome(){
  hideAll();
  document.getElementById("home").style.display="block";
}

function backUser(){
  hideAll();
  document.getElementById("user").style.display="block";
}

function backTypes(){
  hideAll();
  document.getElementById("types").style.display="block";
}
</script>

</body>
</html>
